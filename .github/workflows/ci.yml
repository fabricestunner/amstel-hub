name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: amstel
          POSTGRES_PASSWORD: amstel_dev_password
          POSTGRES_DB: amstel_rewards
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U amstel"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://amstel:amstel_dev_password@localhost:5432/amstel_rewards?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @amstel/api db:generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

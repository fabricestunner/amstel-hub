# ──────────────────────────────────────────────────────────────
# Local development infrastructure.
# `docker compose up -d` brings up Postgres, Redis, MinIO + a mail
# catcher. The api/web apps run on the host via `pnpm dev` (or add
# the commented services below to containerize them too).
# ──────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    container_name: amstel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amstel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amstel_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-amstel_rewards}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amstel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amstel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: amstel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # One-shot job that ensures the bucket exists.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin}) do echo 'waiting for minio...' && sleep 2; done;
      mc mb --ignore-existing local/${S3_BUCKET:-amstel-assets};
      mc anonymous set download local/${S3_BUCKET:-amstel-assets};
      exit 0;
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: amstel-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: 500

  # ── Optional: containerized apps (uncomment to use) ──────────
  # api:
  #   build:
  #     context: .
  #     dockerfile: apps/api/Dockerfile
  #   env_file: .env
  #   ports: ["4000:4000"]
  #   depends_on:
  #     postgres: { condition: service_healthy }
  #     redis: { condition: service_healthy }
  #
  # web:
  #   build:
  #     context: .
  #     dockerfile: apps/web/Dockerfile
  #   env_file: .env
  #   ports: ["3000:3000"]
  #   depends_on: [api]

volumes:
  postgres_data:
  redis_data:
  minio_data:

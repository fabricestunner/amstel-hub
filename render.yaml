# ──────────────────────────────────────────────────────────────
# Render Blueprint — Amstel Rewards API (+ Redis, + Postgres link)
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
# The web app (apps/web) is deployed separately on Vercel.
# ──────────────────────────────────────────────────────────────
services:
  # ── NestJS API (Node runtime, built from the monorepo root) ──
  - type: web
    name: amstel-api
    runtime: node
    region: oregon # same region as the `amstel` Postgres for low latency
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm rebuild argon2 && pnpm --filter @amstel/api db:generate && pnpm --filter @amstel/api build
    # Apply pending migrations, then boot. Render injects PORT.
    #
    # NOTE — deliberately does NOT run `db:seed` or `db push`:
    #   • `db push --accept-data-loss` + `db:seed` on EVERY deploy re-seeded prod
    #     each time, which duplicated the demo rewards ~20× (see
    #     prisma/cleanup-prod-rewards.ts). Seeding is a ONE-TIME step, run
    #     manually from the Render Shell on a fresh database:
    #         pnpm --filter @amstel/api db:seed
    #   • `migrate deploy` only applies pending migrations — no data loss, no
    #     re-seeding.
    #
    # ONE-TIME baseline (run once in the Render Shell BEFORE the first deploy
    # that uses this command): the existing prod DB was built with `db push` and
    # has no migration history, so mark the baseline migration as already
    # applied — otherwise `migrate deploy` tries to re-create existing tables:
    #     pnpm --filter @amstel/api exec prisma migrate resolve --applied 20260721202151_outlet_points_and_rewards
    startCommand: pnpm --filter @amstel/api db:deploy && node apps/api/dist/main.js
    healthCheckPath: /api/v1/health
    autoDeploy: true
    # Custom domain for the API. Render provisions TLS automatically once the
    # DNS record (CNAME → this service) is verified in the Render dashboard.
    domains:
      - api.friendsofamstel.rw
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_GLOBAL_PREFIX
        value: api/v1
      # DB + cache wired automatically from the resources below.
      - key: DATABASE_URL
        fromDatabase:
          name: amstel
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: amstel-redis
          property: connectionString
      # Secrets — generated once by Render, kept stable across deploys.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: "900"
      - key: JWT_REFRESH_TTL
        value: "2592000"
      # ENCRYPTION_KEY must be 32-byte hex (64 chars). Set manually:
      #   openssl rand -hex 32
      - key: ENCRYPTION_KEY
        sync: false
      # Comma-separated allowed web origins (your Vercel domain[s]).
      - key: API_CORS_ORIGINS
        sync: false
      # Object storage (Cloudflare R2 / AWS S3). Set in dashboard.
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      # Email (Resend). Set RESEND_API_KEY in dashboard.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "Amstel Rewards <no-reply@amstel-rewards.com>"
      # SMS (Mista). Set SMS_API_KEY in dashboard.
      - key: SMS_PROVIDER
        value: mista
      - key: SMS_API_KEY
        sync: false
      - key: SMS_SENDER_ID
        value: E-Notifier

  # ── Redis (Render Key Value) — cache, leaderboards, rate-limit ──
  - type: redis
    name: amstel-redis
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: [] # internal-only access

# ── PostgreSQL ───────────────────────────────────────────────
# Matches the `amstel` instance you created in the Render dashboard
# (Oregon). Keeping it here makes the blueprint self-contained and
# lets the API link via `fromDatabase`. If Render reports a conflict
# with your existing DB, remove this block and attach the DB manually.
databases:
  - name: amstel
    region: oregon
    plan: basic-256mb
    postgresMajorVersion: "18"
